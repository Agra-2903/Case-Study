spring.application.name=api-gateway
server.port=8080

# Guest Service Route
spring.cloud.gateway.routes[0].id=guest-service
spring.cloud.gateway.routes[0].uri=lb://guest-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/guests/**

# Room Service Route
spring.cloud.gateway.routes[1].id=room-service
spring.cloud.gateway.routes[1].uri=lb://room-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/rooms/**

# Reservation Service Route
spring.cloud.gateway.routes[2].id=reservation-service
spring.cloud.gateway.routes[2].uri=lb://reservation-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/reservations/**

# Billing Service Route
spring.cloud.gateway.routes[3].id=billing-service
spring.cloud.gateway.routes[3].uri=lb://billing-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/billing/**

# Report Service Route
spring.cloud.gateway.routes[4].id=report-service
spring.cloud.gateway.routes[4].uri=lb://report-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/reports/**

# Email Service Route
spring.cloud.gateway.routes[5].id=email-service
spring.cloud.gateway.routes[5].uri=lb://email-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/email/**

# User Service Route
spring.cloud.gateway.routes[6].id=user-service
spring.cloud.gateway.routes[6].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/users/**

# Eureka Client Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
